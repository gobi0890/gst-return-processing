# Development Profile Configuration
spring.config.activate.on-profile=dev

# Development Database (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration for Development
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging for Development
logging.level.root=INFO
logging.level.com.gst=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Server Configuration for Development
server.port=8080
server.error.include-message=always
server.error.include-stacktrace=always

# JWT Configuration for Development
app.jwt.secret=development-secret-key-for-jwt-token-generation-and-validation-purpose-only
app.jwt.expiration=1800000

# RSA Configuration for Development
app.rsa.algorithm=RSA
app.rsa.keySize=2048
