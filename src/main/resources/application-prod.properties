# Production Profile Configuration
spring.config.activate.on-profile=prod

# Production Database (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://prod-db:5432/gst_return_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA Configuration for Production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging for Production
logging.level.root=WARN
logging.level.com.gst=INFO
logging.file.name=/var/log/gst-return-processing/application.log
logging.file.max-size=50MB
logging.file.max-history=90
logging.file.total-size-cap=10GB

# Server Configuration for Production
server.port=8080
server.compression.enabled=true
server.compression.min-response-size=1024
server.error.include-message=never
server.error.include-stacktrace=never
server.error.whitelabel.enabled=false

# JWT Configuration for Production
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:1800000}

# RSA Configuration for Production
app.rsa.algorithm=RSA
app.rsa.keySize=2048
app.rsa.publicKeyPem=${RSA_PUBLIC_KEY}
app.rsa.privateKeyPem=${RSA_PRIVATE_KEY}

# Security Configuration for Production
spring.security.filter.order=5

# Cache Configuration for Production
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=20000,expireAfterWrite=30m,recordStats
