# Application Configuration
spring.application.name=gst-return-processing

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/gst_return_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Cache Configuration (Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=10000,expireAfterWrite=30m

# Server Configuration
server.port=8080
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.excluded-mime-types=image/png,image/jpeg,image/gif,image/svg+xml

# JWT Configuration
app.jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidationPurposeOnly}
app.jwt.expiration=1800000

# RSA Encryption Configuration
app.rsa.algorithm=RSA
app.rsa.keySize=2048
app.rsa.publicKeyPem=${RSA_PUBLIC_KEY:}
app.rsa.privateKeyPem=${RSA_PRIVATE_KEY:}

# Encryption Configuration
app.encryption.algorithm=RSA
app.encryption.keySize=2048
app.encryption.cipherAlgorithm=RSA/ECB/PKCS1Padding

# Rate Limiting Configuration
app.ratelimit.enabled=true
app.ratelimit.requests-per-minute=100

# Logging Configuration
logging.level.root=INFO
logging.level.com.gst=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/gst-return-processing.log
logging.file.max-size=10MB
logging.file.max-history=30

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# Security Configuration
spring.security.filter.order=5

# Actuator Configuration (Optional)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator
